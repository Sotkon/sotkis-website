<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sotkon Hub Contact Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --sotkon-green: #94c11f;
        --sotkon-green-dark: #7da519;
        --sotkon-ink: #223432;
        --sotkon-muted: #5f6e6a;
        --sotkon-border: #cfdcd0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        padding: 0;
        color: var(--sotkon-ink);
        font-family: "Plus Jakarta Sans", Arial, sans-serif;
      }

      .shc-card {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 28px;
        background: #ffffff;
        border: 1px solid #e3ebe0;
        border-radius: 8px;
        box-shadow: 0 18px 54px rgba(44, 62, 60, 0.12);
      }

      .shc-title {
        margin: 0 0 22px;
        color: var(--sotkon-ink);
        font-size: 2rem;
        line-height: 1.15;
        font-weight: 700;
      }

      .shc-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .shc-field {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .shc-field-full,
      .shc-consents,
      .shc-actions {
        grid-column: 1 / -1;
      }

      label {
        color: #344642;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 46px;
        padding: 11px 13px;
        border: 1px solid var(--sotkon-border);
        border-radius: 6px;
        color: var(--sotkon-ink);
        background: #ffffff;
        font: inherit;
        font-size: 0.95rem;
      }

      textarea {
        min-height: 116px;
        resize: vertical;
        line-height: 1.5;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--sotkon-green);
        background: #fdfffb;
        box-shadow: 0 0 0 4px rgba(148, 193, 31, 0.16);
      }

      .shc-hidden {
        display: none !important;
      }

      .shc-consents {
        display: grid;
        gap: 10px;
        margin-top: 4px;
      }

      .shc-checkbox {
        display: grid;
        grid-template-columns: 20px 1fr;
        gap: 10px;
        align-items: start;
        color: #4c5f5b;
        font-size: 0.9rem;
        line-height: 1.45;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 400;
        cursor: pointer;
      }

      .shc-checkbox input {
        width: 18px;
        height: 18px;
        min-height: 18px;
        margin: 2px 0 0;
        accent-color: var(--sotkon-green);
      }

      .shc-checkbox a {
        color: #5d7f0b;
        font-weight: 700;
        text-decoration: none;
      }

      .shc-checkbox a:hover {
        text-decoration: underline;
      }

      .shc-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin-top: 8px;
      }

      .shc-submit {
        min-height: 44px;
        padding: 0 28px;
        border: 0;
        border-radius: 6px;
        color: var(--sotkon-ink);
        background: var(--sotkon-green);
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .shc-submit:hover {
        background: var(--sotkon-green-dark);
      }

      .shc-submit:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .shc-status {
        margin: 0;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .shc-status-success {
        color: #4e7a08;
      }

      .shc-status-error {
        color: #c53c3c;
      }

      @media (max-width: 620px) {
        .shc-card {
          padding: 20px;
          box-shadow: none;
        }

        .shc-form {
          grid-template-columns: 1fr;
        }

        .shc-submit {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shc-card">
      <h2 class="shc-title" data-shc-text="title">Contact us</h2>

      <form class="shc-form" id="sotkonHubContactForm">
        <div class="shc-field shc-field-full">
          <label for="shcContactType" data-shc-text="contactTypeLabel">Type of contact *</label>
          <select id="shcContactType" name="contactType" required>
            <option value="" data-shc-text="contactTypePlaceholder">Select a Service *</option>
            <option value="newsletter" data-shc-text="newsletterOption">Newsletter</option>
            <option value="distributor" data-shc-text="distributorOption">Become a Distributor</option>
            <option value="information" data-shc-text="informationOption">Receive more information</option>
          </select>
        </div>

        <div class="shc-field shc-field-company shc-hidden">
          <label for="shcCompanyName" data-shc-text="companyLabel">Company</label>
          <input id="shcCompanyName" name="companyName" type="text" autocomplete="organization" placeholder="Company" data-shc-placeholder="companyPlaceholder">
        </div>

        <div class="shc-field shc-field-name shc-hidden">
          <label for="shcName" data-shc-text="nameLabel">Name</label>
          <input id="shcName" name="name" type="text" autocomplete="name" placeholder="Name" data-shc-placeholder="namePlaceholder">
        </div>

        <div class="shc-field shc-field-email shc-hidden">
          <label for="shcEmail" data-shc-text="emailLabel">Email *</label>
          <input id="shcEmail" name="email" type="email" autocomplete="email" placeholder="Email" data-shc-placeholder="emailPlaceholder">
        </div>

        <div class="shc-field shc-field-phone shc-hidden">
          <label for="shcPhone" data-shc-text="phoneLabel">Phone</label>
          <input id="shcPhone" name="phone" type="tel" autocomplete="tel" placeholder="+351 900 000 000" data-shc-placeholder="phonePlaceholder">
        </div>

        <div class="shc-field shc-field-country shc-hidden">
          <label for="shcCountry" data-shc-text="countryLabel">Country</label>
          <select id="shcCountry" name="country">
            <option value="" data-shc-text="countryPlaceholder">Country</option>
            <option>Portugal</option>
            <option>Spain</option>
            <option>France</option>
            <option>Germany</option>
            <option>Italy</option>
            <option>United Kingdom</option>
            <option>Netherlands</option>
            <option>Belgium</option>
            <option>Switzerland</option>
            <option>Austria</option>
            <option>Poland</option>
            <option>Sweden</option>
            <option>Norway</option>
            <option>Denmark</option>
            <option>Finland</option>
            <option>Ireland</option>
            <option>Czech Republic</option>
            <option>Romania</option>
            <option>Hungary</option>
            <option>Greece</option>
            <option>Brazil</option>
            <option>United States</option>
            <option>Canada</option>
            <option>Mexico</option>
            <option>Argentina</option>
            <option>Colombia</option>
            <option>Chile</option>
            <option>China</option>
            <option>Japan</option>
            <option>India</option>
            <option>Australia</option>
            <option>South Africa</option>
            <option>United Arab Emirates</option>
            <option>Saudi Arabia</option>
            <option>Other</option>
          </select>
        </div>

        <div class="shc-field shc-field-comments shc-field-full shc-hidden">
          <label for="shcComments" data-shc-text="commentsLabel">Message</label>
          <textarea id="shcComments" name="comments" rows="4" placeholder="Message" data-shc-placeholder="commentsPlaceholder"></textarea>
        </div>

        <div class="shc-consents">
          <label class="shc-checkbox">
            <input id="shcPrivacy" name="privacyPolicy" type="checkbox" required>
            <span data-shc-consent="privacy">
              By entering my data, I accept Sotkon's
              <a href="https://sotkon.com/en/privacy-cookie-policy/" target="_blank" rel="noopener noreferrer">Privacy and Cookies Policy</a>
            </span>
          </label>

          <label class="shc-checkbox">
            <input id="shcNewsletter" name="newsletter" type="checkbox">
            <span data-shc-text="newsletterConsent">By entering my data, I authorize the receipt of Sotkon's newsletter</span>
          </label>
        </div>

        <div class="shc-actions">
          <button class="shc-submit" id="shcSubmit" type="submit" data-shc-text="submit">Send Message</button>
          <p class="shc-status" id="shcStatus" aria-live="polite"></p>
        </div>
      </form>
    </div>

    <script>
      (function () {
        var HUB_URL = "https://hub.sotkon.org/api/web-contacts";
        var translations = {
          en: {
            title: "Contact us",
            contactTypeLabel: "Type of contact *",
            contactTypePlaceholder: "Select a Service *",
            newsletterOption: "Newsletter",
            distributorOption: "Become a Distributor",
            informationOption: "Receive more information",
            companyLabel: "Company",
            companyPlaceholder: "Company",
            nameLabel: "Name",
            namePlaceholder: "Name",
            emailLabel: "Email *",
            emailPlaceholder: "Email",
            phoneLabel: "Phone",
            phonePlaceholder: "+351 900 000 000",
            countryLabel: "Country",
            countryPlaceholder: "Country",
            commentsLabel: "Message",
            commentsPlaceholder: "Message",
            privacyPrefix: "By entering my data, I accept Sotkon's",
            privacyLink: "Privacy and Cookies Policy",
            privacyUrl: "https://sotkon.com/en/privacy-cookie-policy/",
            newsletterConsent: "By entering my data, I authorize the receipt of Sotkon's newsletter",
            submit: "Send Message",
            submitting: "Sending...",
            success: "Thank you! We will be in touch soon.",
            error: "Something went wrong. Please try again."
          },
          pt: {
            title: "Fale connosco",
            contactTypeLabel: "Tipo de contacto *",
            contactTypePlaceholder: "Tipo de contacto *",
            newsletterOption: "Newsletter",
            distributorOption: "Tornar-me Distribuidor",
            informationOption: "Receber mais informação",
            companyLabel: "Empresa",
            companyPlaceholder: "Empresa",
            nameLabel: "Nome",
            namePlaceholder: "Nome",
            emailLabel: "Correio Eletrónico *",
            emailPlaceholder: "exemplo@email.com",
            phoneLabel: "Telefone",
            phonePlaceholder: "+351 900 000 000",
            countryLabel: "País",
            countryPlaceholder: "País",
            commentsLabel: "Comentários",
            commentsPlaceholder: "Comentários",
            privacyPrefix: "Ao introduzir os meus dados eu aceito a",
            privacyLink: "Política de Privacidade e Cookies da Sotkon",
            privacyUrl: "https://sotkon.com/pt/privacy-policy/",
            newsletterConsent: "Ao introduzir os meus dados, autorizo a receção da newsletter da Sotkon",
            submit: "Enviar Mensagem",
            submitting: "A enviar...",
            success: "Obrigado! Entraremos em contacto em breve.",
            error: "Algo correu mal. Por favor, tente novamente."
          },
          es: {
            title: "Hable con nosotros",
            contactTypeLabel: "Tipo de contacto *",
            contactTypePlaceholder: "Tipo de contacto *",
            newsletterOption: "Newsletter",
            distributorOption: "Convertirse en Distribuidor",
            informationOption: "Recibir más información",
            companyLabel: "Empresa",
            companyPlaceholder: "Empresa",
            nameLabel: "Nombre",
            namePlaceholder: "Nombre",
            emailLabel: "Correo Electrónico *",
            emailPlaceholder: "ejemplo@email.com",
            phoneLabel: "Teléfono",
            phonePlaceholder: "+351 900 000 000",
            countryLabel: "País",
            countryPlaceholder: "País",
            commentsLabel: "Mensaje",
            commentsPlaceholder: "Mensaje",
            privacyPrefix: "Al introducir mis datos acepto la",
            privacyLink: "Política de Privacidad y Cookies de Sotkon",
            privacyUrl: "https://sotkon.com/en/privacy-cookie-policy/",
            newsletterConsent: "Al introducir mis datos, autorizo la recepción del boletín de Sotkon",
            submit: "Enviar Mensaje",
            submitting: "Enviando...",
            success: "Gracias. Nos pondremos en contacto pronto.",
            error: "Algo salió mal. Por favor, inténtelo de nuevo."
          },
          fr: {
            title: "Parlez-nous",
            contactTypeLabel: "Type de contact *",
            contactTypePlaceholder: "Type de contact *",
            newsletterOption: "Newsletter",
            distributorOption: "Devenir Distributeur",
            informationOption: "Recevoir plus d'informations",
            companyLabel: "Entreprise",
            companyPlaceholder: "Entreprise",
            nameLabel: "Nom",
            namePlaceholder: "Nom",
            emailLabel: "Email *",
            emailPlaceholder: "exemple@email.com",
            phoneLabel: "Téléphone",
            phonePlaceholder: "+351 900 000 000",
            countryLabel: "Pays",
            countryPlaceholder: "Pays",
            commentsLabel: "Message",
            commentsPlaceholder: "Message",
            privacyPrefix: "En saisissant mes données, j'accepte la",
            privacyLink: "Politique de Confidentialité et Cookies de Sotkon",
            privacyUrl: "https://sotkon.com/en/privacy-cookie-policy/",
            newsletterConsent: "En saisissant mes données, j'autorise la réception de la newsletter de Sotkon",
            submit: "Envoyer le Message",
            submitting: "Envoi en cours...",
            success: "Merci. Nous vous contacterons bientôt.",
            error: "Quelque chose s'est mal passé. Veuillez réessayer."
          }
        };
        var form = document.getElementById("sotkonHubContactForm");
        var contactType = document.getElementById("shcContactType");
        var email = document.getElementById("shcEmail");
        var submit = document.getElementById("shcSubmit");
        var status = document.getElementById("shcStatus");
        var activeText = translations.en;

        var fields = {
          company: document.querySelector(".shc-field-company"),
          name: document.querySelector(".shc-field-name"),
          email: document.querySelector(".shc-field-email"),
          phone: document.querySelector(".shc-field-phone"),
          country: document.querySelector(".shc-field-country"),
          comments: document.querySelector(".shc-field-comments")
        };

        function getLanguage() {
          var params = new URLSearchParams(window.location.search);
          var requested = params.get("lang");
          var referrer = document.referrer || "";
          var referrerMatch = referrer.match(/\/(pt|en|es|fr)(\/|$)/i);
          var browserLanguage = (navigator.language || "en").slice(0, 2).toLowerCase();
          var language = (requested || (referrerMatch && referrerMatch[1]) || browserLanguage || "en").toLowerCase();
          return translations[language] ? language : "en";
        }

        function applyLanguage() {
          var language = getLanguage();
          activeText = translations[language];
          document.documentElement.lang = language;

          document.querySelectorAll("[data-shc-text]").forEach(function (element) {
            var key = element.getAttribute("data-shc-text");
            if (activeText[key]) element.textContent = activeText[key];
          });

          document.querySelectorAll("[data-shc-placeholder]").forEach(function (element) {
            var key = element.getAttribute("data-shc-placeholder");
            if (activeText[key]) element.setAttribute("placeholder", activeText[key]);
          });

          document.querySelector("[data-shc-consent='privacy']").innerHTML =
            activeText.privacyPrefix + ' <a href="' + activeText.privacyUrl + '" target="_blank" rel="noopener noreferrer">' + activeText.privacyLink + "</a>";
        }

        function setVisible(field, visible) {
          field.classList.toggle("shc-hidden", !visible);
        }

        function updateFields() {
          var type = contactType.value;

          setVisible(fields.company, type === "distributor");
          setVisible(fields.phone, type === "distributor");
          setVisible(fields.country, type === "newsletter" || type === "distributor");
          setVisible(fields.comments, type === "distributor" || type === "information");
          setVisible(fields.name, type === "newsletter" || type === "information");
          setVisible(fields.email, !!type);

          email.required = !!type;
          status.textContent = "";
          status.className = "shc-status";
        }

        function value(id) {
          return document.getElementById(id).value.trim();
        }

        function checked(id) {
          return document.getElementById(id).checked;
        }

        function resetForm() {
          form.reset();
          updateFields();
        }

        contactType.addEventListener("change", updateFields);

        form.addEventListener("submit", function (event) {
          event.preventDefault();

          if (!form.reportValidity()) return;

          var payload = {
            contactType: value("shcContactType"),
            email: value("shcEmail"),
            name: value("shcName") || null,
            country: value("shcCountry") || null,
            companyName: value("shcCompanyName") || null,
            phone: value("shcPhone") || null,
            comments: value("shcComments") || null,
            privacyAccepted: checked("shcPrivacy"),
            newsletterConsent: checked("shcNewsletter"),
            privacyPolicyVersion: "v1.0"
          };

          submit.disabled = true;
          submit.textContent = activeText.submitting;
          status.textContent = "";
          status.className = "shc-status";

          fetch(HUB_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          })
            .then(function (response) {
              if (!response.ok) throw new Error("Hub error");
              status.textContent = activeText.success;
              status.className = "shc-status shc-status-success";
              resetForm();
            })
            .catch(function () {
              status.textContent = activeText.error;
              status.className = "shc-status shc-status-error";
            })
            .finally(function () {
              submit.disabled = false;
              submit.textContent = activeText.submit;
            });
        });

        applyLanguage();
        updateFields();
      })();
    </script>
  </body>
</html>
